<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#1A2235"/>
      <stop offset="60%" stop-color="#0E1421"/>
      <stop offset="100%" stop-color="#060910"/>
    </radialGradient>
    <linearGradient id="copper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4944C"/>
      <stop offset="100%" stop-color="#9A6025"/>
    </linearGradient>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>

  <!-- base -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- atmospheric copper glow -->
  <circle cx="200" cy="150" r="105" fill="#D4944C" opacity="0.26" filter="url(#softBlur)"/>

  <!-- decorative rings (circle-safe for LinkedIn crop) -->
  <circle cx="200" cy="200" r="170" fill="none" stroke="#D4944C" stroke-width="1" opacity="0.22"/>
  <circle cx="200" cy="200" r="185" fill="none" stroke="#D4944C" stroke-width="0.5" opacity="0.1"/>

  <!-- logo square (smaller, top-centered) -->
  <rect x="140" y="78" width="120" height="120" rx="26" fill="url(#copper)"/>
  <rect x="140" y="78" width="120" height="120" rx="26" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.18"/>

  <!-- T mark -->
  <text x="200" y="176" font-family="Fraunces, Georgia, serif" font-size="104" font-weight="700" fill="#FFFFFF" text-anchor="middle">T</text>

  <!-- Wordmark -->
  <text x="200" y="260" font-family="Fraunces, Georgia, serif" font-size="44" font-weight="600" fill="#FAF7F2" text-anchor="middle" letter-spacing="-0.01em">TowerIQ</text>

  <!-- Tagline -->
  <text x="200" y="294" font-family="DM Sans, sans-serif" font-size="11" letter-spacing="0.22em" fill="#D4944C" font-weight="500" text-anchor="middle">AI PORTFOLIO INTELLIGENCE</text>
</svg>
