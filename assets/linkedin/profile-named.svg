<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="48%" r="62%">
      <stop offset="0%" stop-color="#1C2539"/>
      <stop offset="65%" stop-color="#101726"/>
      <stop offset="100%" stop-color="#070B14"/>
    </radialGradient>
    <linearGradient id="copper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4944C"/>
      <stop offset="100%" stop-color="#9A6025"/>
    </linearGradient>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
  </defs>

  <!-- base -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- atmospheric copper glow -->
  <circle cx="200" cy="180" r="150" fill="#D4944C" opacity="0.3" filter="url(#softBlur)"/>

  <!-- logo square (bigger, centered) -->
  <rect x="128" y="40" width="144" height="144" rx="30" fill="url(#copper)"/>
  <rect x="128" y="40" width="144" height="144" rx="30" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.18"/>

  <!-- T mark -->
  <text x="200" y="159" font-family="Fraunces, Georgia, serif" font-size="124" font-weight="700" fill="#FFFFFF" text-anchor="middle">T</text>

  <!-- Wordmark -->
  <text x="200" y="264" font-family="Fraunces, Georgia, serif" font-size="56" font-weight="600" fill="#FAF7F2" text-anchor="middle" letter-spacing="-0.01em">TowerIQ<tspan fill="#D4944C">.ai</tspan></text>

  <!-- Tagline -->
  <text x="200" y="302" font-family="DM Sans, sans-serif" font-size="13" letter-spacing="0.22em" fill="#D4944C" font-weight="500" text-anchor="middle">AI PORTFOLIO INTELLIGENCE</text>
</svg>
