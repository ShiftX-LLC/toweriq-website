<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1A2235"/>
      <stop offset="60%" stop-color="#0E1421"/>
      <stop offset="100%" stop-color="#060910"/>
    </radialGradient>
    <linearGradient id="copper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4944C"/>
      <stop offset="100%" stop-color="#9A6025"/>
    </linearGradient>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>

  <!-- base -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- atmospheric copper glow -->
  <circle cx="200" cy="175" r="120" fill="#D4944C" opacity="0.28" filter="url(#softBlur)"/>

  <!-- decorative rings (circle-safe for LinkedIn crop) -->
  <circle cx="200" cy="200" r="165" fill="none" stroke="#D4944C" stroke-width="1" opacity="0.22"/>
  <circle cx="200" cy="200" r="182" fill="none" stroke="#D4944C" stroke-width="0.6" opacity="0.1"/>

  <!-- logo square -->
  <rect x="110" y="110" width="180" height="180" rx="38" fill="url(#copper)"/>
  <rect x="110" y="110" width="180" height="180" rx="38" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.15"/>

  <!-- T mark -->
  <text x="200" y="256" font-family="Fraunces, Georgia, serif" font-size="160" font-weight="700" fill="#FFFFFF" text-anchor="middle">T</text>
</svg>
