<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="48%" r="62%">
      <stop offset="0%" stop-color="#1C2539"/>
      <stop offset="65%" stop-color="#101726"/>
      <stop offset="100%" stop-color="#070B14"/>
    </radialGradient>
    <linearGradient id="copper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4944C"/>
      <stop offset="100%" stop-color="#9A6025"/>
    </linearGradient>
  </defs>

  <!-- base -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- logo square (bigger, centered) -->
  <rect x="128" y="40" width="144" height="144" rx="30" fill="url(#copper)"/>
  <rect x="128" y="40" width="144" height="144" rx="30" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.18"/>

  <!-- T mark -->
  <text x="200" y="159" font-family="Fraunces, Georgia, serif" font-size="124" font-weight="700" fill="#FFFFFF" text-anchor="middle">T</text>

  <!-- Wordmark -->
  <text x="200" y="258" font-family="Fraunces, Georgia, serif" font-size="56" font-weight="600" fill="#FAF7F2" text-anchor="middle" letter-spacing="-0.01em">TowerIQ.ai</text>

  <!-- Tagline -->
  <text x="200" y="292" font-family="DM Sans, sans-serif" font-size="13" letter-spacing="0.22em" fill="#D4944C" font-weight="500" text-anchor="middle">AI PORTFOLIO INTELLIGENCE</text>

  <!-- Parent company attribution -->
  <line x1="170" y1="332" x2="230" y2="332" stroke="#D4944C" stroke-opacity="0.35" stroke-width="0.8"/>
  <text x="200" y="358" font-family="DM Sans, sans-serif" font-size="11" letter-spacing="0.28em" fill="#94A3B8" font-weight="500" text-anchor="middle">A SHIFTX.AI COMPANY</text>
</svg>
