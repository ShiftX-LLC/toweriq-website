<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <linearGradient id="copper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4944C"/>
      <stop offset="100%" stop-color="#9A6025"/>
    </linearGradient>
    <linearGradient id="topAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4944C" stop-opacity="1"/>
      <stop offset="45%" stop-color="#D4944C" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#D4944C" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#D4944C" stroke-width="1" opacity="0.06"/>
    </pattern>
    <radialGradient id="orbCopper" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4944C" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#D4944C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbIndigo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- base -->
  <rect width="1584" height="396" fill="#0A0F1C"/>

  <!-- orbs -->
  <rect x="-100" y="-80" width="520" height="520" fill="url(#orbIndigo)"/>
  <rect x="1180" y="-140" width="640" height="640" fill="url(#orbCopper)"/>

  <!-- grid -->
  <rect width="1584" height="396" fill="url(#grid)"/>

  <!-- top accent -->
  <rect x="0" y="0" width="1584" height="2" fill="url(#topAccent)"/>

  <!-- vertical divider at horizontal center (x=792) -->
  <line x1="792" y1="140" x2="792" y2="256" stroke="#D4944C" stroke-opacity="0.3" stroke-width="1"/>

  <!-- ─── LEFT: tagline centered in left half (cx=396, cy=198) ─── -->
  <text x="396" y="206" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="22" letter-spacing="0.28em" fill="#D4944C" font-weight="500">AI PORTFOLIO INTELLIGENCE</text>

  <!-- ─── RIGHT: TowerIQ.ai + subtitle centered in right half (cx=1188, cy=198) ─── -->
  <!-- pivot at x=1320: TowerIQ right-anchored, .ai left-anchored at same pivot — no overlap regardless of font metrics -->
  <text x="1320" y="218" text-anchor="end" font-family="Fraunces, Georgia, serif" font-size="82" font-weight="600" fill="#FAF7F2" letter-spacing="-0.01em">TowerIQ</text>
  <text x="1320" y="218" text-anchor="start" font-family="Fraunces, Georgia, serif" font-size="82" font-weight="600" fill="#D4944C" letter-spacing="-0.01em">.ai</text>
  <text x="1188" y="258" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="17" fill="#94A3B8">See, govern, and optimize every AI investment from one command center.</text>
</svg>
